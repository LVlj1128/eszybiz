 <!doctype html>
  <html lang="en">
  <head>
    <meta charset="utf-8">
    <title>TikTok Callback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        color: #111;
        line-height: 1.6;
      }
      .box {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        background: #fafafa;
      }
      code {
        word-break: break-all;
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 4px;
      }
      .label {
        font-weight: 600;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>TikTok Authorization Callback</h1>
    <div class="box">
      <p>TikTok has redirected back to this page.</p>
      <p class="label">Code</p>
      <div><code id="code">N/A</code></div>
      <p class="label">State</p>
      <div><code id="state">N/A</code></div>
      <p class="label">Full URL</p>
      <div><code id="full-url"></code></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById('code').textContent = params.get('code') || 'N/A';
      document.getElementById('state').textContent = params.get('state') || 'N/A';
      document.getElementById('full-url').textContent = window.location.href;
    </script>
  </body>
  </html>
